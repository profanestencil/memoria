<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>Memoria — AR</title>
    <script>
      ;(function () {
        var p = new URLSearchParams(location.search)
        var u = p.get('imageUrl')
        if (u) {
          var l = document.createElement('link')
          l.rel = 'preload'
          l.as = 'image'
          l.href = u
          l.crossOrigin = 'anonymous'
          document.head.appendChild(l)
        }
      })()
    </script>
    <script
      src="/external/xr/xr.js"
      async
      crossorigin="anonymous"
      data-preload-chunks="slam"
      data-8thwall="xr"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js"
      crossorigin="anonymous"
    ></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: system-ui, -apple-system, sans-serif;
        color: #eae6e1;
      }
      #camerafeed {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        touch-action: none;
      }
      .mem-ar-splash {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #000;
        transition: opacity 0.45s ease, visibility 0.45s ease;
      }
      .mem-ar-splash--hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .mem-ar-splash img {
        width: min(148px, 42vw);
        height: auto;
        opacity: 0.96;
      }
      .mem-ar-splash__sub {
        margin: 0;
        font-size: 13px;
        letter-spacing: 0.04em;
        color: rgba(255, 255, 255, 0.42);
      }
      .mem-ar-chrome {
        position: fixed;
        z-index: 20;
        pointer-events: none;
        inset: 0;
      }
      .mem-ar-chrome button {
        pointer-events: auto;
        font: inherit;
        cursor: pointer;
        border-radius: 12px;
        border: 1px solid rgba(232, 197, 71, 0.35);
        background: rgba(10, 9, 8, 0.88);
        color: #eae6e1;
        padding: 10px 14px;
        font-weight: 600;
        font-size: 14px;
      }
      .mem-ar-chrome__top {
        position: absolute;
        top: max(12px, env(safe-area-inset-top));
        left: 12px;
      }
      .mem-ar-chrome__hint {
        position: absolute;
        left: 16px;
        right: 16px;
        bottom: max(88px, calc(env(safe-area-inset-bottom) + 68px));
        max-width: 420px;
        margin: 0 auto;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(8, 7, 6, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.14);
        font-size: 14px;
        line-height: 1.45;
        text-align: center;
        color: rgba(255, 255, 255, 0.92);
        transition: opacity 0.25s ease;
      }
      .mem-ar-chrome__hint--hidden {
        opacity: 0;
        pointer-events: none;
      }
      .mem-ar-meta {
        position: absolute;
        left: 16px;
        right: 16px;
        bottom: max(16px, env(safe-area-inset-bottom));
        max-width: 420px;
        margin: 0 auto;
        text-align: center;
        pointer-events: none;
      }
      .mem-ar-meta__title {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.01em;
        color: rgba(255, 255, 255, 0.88);
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.65);
      }
      .mem-ar-meta__creator {
        margin: 4px 0 0;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.52);
        text-shadow: 0 1px 6px rgba(0, 0, 0, 0.55);
      }
      .mem-ar-chrome__error {
        position: absolute;
        left: 16px;
        right: 16px;
        bottom: max(20px, env(safe-area-inset-bottom));
        max-width: 420px;
        margin: 0 auto;
        padding: 14px;
        border-radius: 14px;
        background: rgba(80, 28, 28, 0.55);
        border: 1px solid rgba(240, 160, 160, 0.22);
        color: #ffd4d4;
        font-size: 14px;
        line-height: 1.45;
        text-align: center;
      }
      .mem-ar-chrome__hidden {
        display: none !important;
      }
      .mem-ar-tap-gate {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: max(24px, env(safe-area-inset-bottom)) 20px;
        background: rgba(6, 5, 4, 0.55);
        pointer-events: auto;
      }
      .mem-ar-tap-gate__panel {
        width: 100%;
        max-width: 420px;
        padding: 16px;
        border-radius: 14px;
        background: rgba(8, 7, 6, 0.92);
        border: 1px solid rgba(232, 197, 71, 0.35);
        text-align: center;
        font-size: 15px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <div id="splash" class="mem-ar-splash" aria-hidden="false">
      <img src="/illust-logo-white.png" alt="illust." width="148" height="40" decoding="async" />
      <p class="mem-ar-splash__sub">Loading memory…</p>
    </div>

    <canvas id="camerafeed"></canvas>

    <div class="mem-ar-chrome" aria-live="polite">
      <div class="mem-ar-chrome__top">
        <button type="button" id="back-btn" aria-label="Back to map">← Map</button>
      </div>
      <p id="hint-line" class="mem-ar-chrome__hint mem-ar-chrome__hint--hidden">
        Move your phone slowly to find a surface
      </p>
      <div id="meta-block" class="mem-ar-meta">
        <p id="meta-title" class="mem-ar-meta__title"></p>
        <p id="meta-creator" class="mem-ar-meta__creator"></p>
      </div>
      <p id="error-line" class="mem-ar-chrome__error mem-ar-chrome__hidden" role="alert"></p>
    </div>

    <div id="tap-gate" class="mem-ar-tap-gate mem-ar-chrome__hidden" role="button" tabindex="0">
      <div class="mem-ar-tap-gate__panel">Tap to start the camera</div>
    </div>

    <script type="module">
      import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js'

      window.THREE = THREE

      const params = new URLSearchParams(window.location.search)
      const imageUrl = params.get('imageUrl') || ''
      const title = params.get('title') || 'Memory'
      const creator = params.get('creator') || ''
      const orientationParam = params.get('orientation')
      const orientation =
        orientationParam === 'landscape' || orientationParam === 'portrait'
          ? orientationParam
          : 'portrait'

      const canvas = document.getElementById('camerafeed')
      const hintLine = document.getElementById('hint-line')
      const errorLine = document.getElementById('error-line')
      const backBtn = document.getElementById('back-btn')
      const tapGate = document.getElementById('tap-gate')
      const splash = document.getElementById('splash')
      const metaTitle = document.getElementById('meta-title')
      const metaCreator = document.getElementById('meta-creator')

      document.title = 'Memoria — ' + title
      metaTitle.textContent = title
      metaCreator.textContent = creator ? 'by ' + creator : ''

      const hideSplash = () => {
        splash.classList.add('mem-ar-splash--hidden')
        splash.setAttribute('aria-hidden', 'true')
      }

      const showError = (msg) => {
        hideSplash()
        errorLine.textContent = msg
        errorLine.classList.remove('mem-ar-chrome__hidden')
        hintLine.classList.add('mem-ar-chrome__hint--hidden')
      }

      const setHint = (msg, visible = true) => {
        hintLine.textContent = msg
        hintLine.classList.toggle('mem-ar-chrome__hint--hidden', !visible)
      }

      if (!imageUrl) {
        showError('No memory image. Open this view from a map pin.')
      }

      backBtn.addEventListener('click', () => {
        try {
          window.XR8?.stop?.()
        } catch {
          /* ignore */
        }
        if (window.history.length > 1) window.history.back()
        else window.location.href = '/map'
      })

      /** Pre-built phone-camera aspect boards (meters). */
      const CARD_TEMPLATES = {
        portrait: { w: 0.54, h: 0.96, depth: 0.024 },
        landscape: { w: 0.96, h: 0.54, depth: 0.024 },
      }

      const createCanvasNormalMap = (size = 256) => {
        const c = document.createElement('canvas')
        c.width = size
        c.height = size
        const ctx = c.getContext('2d')
        const imgData = ctx.createImageData(size, size)
        const d = imgData.data
        for (let y = 0; y < size; y++) {
          for (let x = 0; x < size; x++) {
            const weave =
              Math.sin(x * 0.36 + y * 0.08) * Math.sin(y * 0.34 + x * 0.05) * 0.07
            const grain = ((x * 17 + y * 31) % 7) / 7 * 0.025 - 0.012
            const nx = weave + grain * 0.6
            const ny = grain - weave * 0.4
            const nz = Math.sqrt(Math.max(0.05, 1 - nx * nx - ny * ny))
            const i = (y * size + x) * 4
            d[i] = Math.floor((nx * 0.5 + 0.5) * 255)
            d[i + 1] = Math.floor((ny * 0.5 + 0.5) * 255)
            d[i + 2] = Math.floor((nz * 0.5 + 0.5) * 255)
            d[i + 3] = 255
          }
        }
        ctx.putImageData(imgData, 0, 0)
        const tex = new THREE.CanvasTexture(c)
        tex.wrapS = THREE.RepeatWrapping
        tex.wrapT = THREE.RepeatWrapping
        tex.repeat.set(5, 5)
        return tex
      }

      const canvasNormal = createCanvasNormalMap()

      const buildPrebuiltBoard = (tex, orient) => {
        const t = CARD_TEMPLATES[orient] || CARD_TEMPLATES.portrait
        const { w, h, depth } = t

        const frameMat = new THREE.MeshStandardMaterial({
          color: 0x1a1714,
          roughness: 0.84,
          metalness: 0.02,
        })
        const backMat = new THREE.MeshStandardMaterial({
          color: 0xd8d4cc,
          roughness: 0.94,
          metalness: 0,
        })
        const frontMat = new THREE.MeshStandardMaterial({
          map: tex,
          normalMap: canvasNormal,
          normalScale: new THREE.Vector2(0.16, 0.16),
          roughness: 0.58,
          metalness: 0.02,
        })

        // BoxGeometry face order: +x, -x, +y, -y, +z (front), -z (back)
        const board = new THREE.Mesh(
          new THREE.BoxGeometry(w, h, depth),
          [frameMat, frameMat, frameMat, frameMat, frontMat, backMat]
        )
        board.castShadow = true
        board.receiveShadow = true

        const tiltGroup = new THREE.Group()
        tiltGroup.add(board)
        return { tiltGroup, cardHeight: h }
      }

      const texturePromise = imageUrl
        ? new Promise((resolve, reject) => {
            const loader = new THREE.TextureLoader()
            if (!imageUrl.startsWith('blob:') && !imageUrl.startsWith('data:')) {
              loader.setCrossOrigin('anonymous')
            }
            loader.load(
              imageUrl,
              (tex) => {
                tex.colorSpace = THREE.SRGBColorSpace
                tex.anisotropy = 8
                resolve(tex)
              },
              undefined,
              () => reject(new Error('Could not load the memory image.'))
            )
          })
        : null

      const requestMotionIfNeeded = async () => {
        const dm = window.DeviceMotionEvent
        const dor = window.DeviceOrientationEvent
        const req = dm?.requestPermission || dor?.requestPermission
        if (!req) return true
        try {
          const res = await req.call(dm?.requestPermission ? dm : dor)
          return res === 'granted'
        } catch {
          return false
        }
      }

      const isPermissionError = (e) => {
        const msg = (e instanceof Error ? e.message : String(e)).toLowerCase()
        return (
          msg.includes('permission') ||
          msg.includes('notallowed') ||
          msg.includes('denied') ||
          msg.includes('gesture')
        )
      }

      let xrRunning = false
      let memoryAnchor = null
      let tiltGroup = null
      let cardHeight = 1
      let phase = 'SCANNING'
      let baseY = 0
      let placedAtMs = 0
      let hitWindow = { frames: 0, samples: [], last: null, normal: null }

      const drag = { yaw: 0, pitch: 0, active: false, moved: false, lastX: 0, lastY: 0 }
      const MAX_YAW = 0.85
      const MAX_PITCH = 0.55
      const DRAG_SENS = 0.0042
      const TAP_MOVE_PX = 10

      const dist3 = (a, b) => a.distanceTo(b)

      const getHitCenter = () => {
        try {
          const hits = window.XR8?.XrController?.hitTest?.(0.5, 0.5)
          if (!Array.isArray(hits) || hits.length === 0) return null
          const h = hits[0]
          const pos = h.position ?? h
          const p = new THREE.Vector3(pos.x ?? 0, pos.y ?? 0, pos.z ?? 0)
          const n0 = h.normal
          const n = n0
            ? new THREE.Vector3(n0.x ?? 0, n0.y ?? 1, n0.z ?? 0)
            : new THREE.Vector3(0, 1, 0)
          if (n.lengthSq() < 1e-6) n.set(0, 1, 0)
          n.normalize()
          return { position: p, normal: n }
        } catch {
          return null
        }
      }

      const resetHitWindow = () => {
        hitWindow = { frames: 0, samples: [], last: null, normal: null }
      }

      const updateLocking = (hit) => {
        if (!hit) {
          resetHitWindow()
          return { stable: false, avg: null, normal: null }
        }
        if (hit.normal.y < 0.75) {
          resetHitWindow()
          return { stable: false, avg: null, normal: null }
        }
        if (hitWindow.last && dist3(hitWindow.last, hit.position) > 0.06) {
          resetHitWindow()
        }
        hitWindow.frames += 1
        hitWindow.last = hit.position.clone()
        hitWindow.samples.push(hit.position.clone())
        if (hitWindow.samples.length > 18) hitWindow.samples.shift()
        hitWindow.normal = hit.normal.clone()
        const stable = hitWindow.frames >= 14
        if (!stable) return { stable: false, avg: null, normal: null }
        const avg = hitWindow.samples
          .reduce((acc, v) => acc.add(v), new THREE.Vector3())
          .multiplyScalar(1 / hitWindow.samples.length)
        return { stable: true, avg, normal: hitWindow.normal }
      }

      const placeCardInWorld = (point, normal, camera) => {
        if (!memoryAnchor) return
        const up = normal.clone().normalize()
        const face = new THREE.Vector3().subVectors(camera.position, point)
        face.y = 0
        if (face.lengthSq() < 1e-6) face.set(0, 0, -1)
        face.normalize()

        const target = point.clone().addScaledVector(up, cardHeight * 0.5 + 0.02)
        memoryAnchor.position.copy(target)

        const m = new THREE.Matrix4()
        const z = face.clone()
        const x = new THREE.Vector3().crossVectors(up, z).normalize()
        const y = new THREE.Vector3().crossVectors(z, x).normalize()
        m.makeBasis(x, y, z)
        memoryAnchor.quaternion.setFromRotationMatrix(m)

        baseY = memoryAnchor.position.y
        placedAtMs = Date.now()
        phase = 'PLACED'
        setHint('Drag to rotate · tap to recenter', true)
        window.setTimeout(() => setHint('', false), 4000)
      }

      const bindTouchGestures = () => {
        const onStart = (e) => {
          if (phase !== 'PLACED' || e.touches.length !== 1) return
          drag.active = true
          drag.moved = false
          drag.lastX = e.touches[0].clientX
          drag.lastY = e.touches[0].clientY
        }

        const onMove = (e) => {
          if (!drag.active || e.touches.length !== 1) return
          const x = e.touches[0].clientX
          const y = e.touches[0].clientY
          const dx = x - drag.lastX
          const dy = y - drag.lastY
          if (!drag.moved && Math.hypot(dx, dy) < TAP_MOVE_PX) return
          drag.moved = true
          drag.lastX = x
          drag.lastY = y
          drag.yaw = Math.max(-MAX_YAW, Math.min(MAX_YAW, drag.yaw + dx * DRAG_SENS))
          drag.pitch = Math.max(-MAX_PITCH, Math.min(MAX_PITCH, drag.pitch - dy * DRAG_SENS))
          e.preventDefault()
        }

        const onEnd = () => {
          if (drag.active && !drag.moved && phase === 'PLACED') {
            try {
              window.XR8.XrController.recenter()
            } catch {
              /* ignore */
            }
          }
          drag.active = false
        }

        canvas.addEventListener('touchstart', onStart, { passive: true })
        canvas.addEventListener('touchmove', onMove, { passive: false })
        canvas.addEventListener('touchend', onEnd)
        canvas.addEventListener('touchcancel', onEnd)
      }

      const memorySceneModule = () => ({
        name: 'memoria-world-memory',
        onStart: async () => {
          hideSplash()

          const xrScene = window.XR8.Threejs.xrScene()
          const { scene, camera, renderer } = xrScene

          renderer.shadowMap.enabled = true
          renderer.shadowMap.type = THREE.PCFSoftShadowMap
          scene.background = null
          renderer.autoClear = false
          renderer.setClearColor(0x000000, 0)

          const hemi = new THREE.HemisphereLight(0xfff8ee, 0x2a2520, 0.55)
          scene.add(hemi)

          const sun = new THREE.DirectionalLight(0xffffff, 1.1)
          sun.position.set(3, 6, 2)
          sun.castShadow = true
          sun.shadow.mapSize.set(1024, 1024)
          sun.shadow.camera.near = 0.2
          sun.shadow.camera.far = 18
          sun.shadow.camera.left = -5
          sun.shadow.camera.right = 5
          sun.shadow.camera.top = 5
          sun.shadow.camera.bottom = -5
          sun.shadow.bias = -0.0004
          scene.add(sun)

          const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(24, 24),
            new THREE.ShadowMaterial({ opacity: 0.38 })
          )
          ground.rotation.x = -Math.PI / 2
          ground.receiveShadow = true
          scene.add(ground)

          memoryAnchor = new THREE.Group()
          memoryAnchor.visible = false
          scene.add(memoryAnchor)

          try {
            const tex = await texturePromise
            const built = buildPrebuiltBoard(tex, orientation)
            tiltGroup = built.tiltGroup
            cardHeight = built.cardHeight
            memoryAnchor.add(tiltGroup)
          } catch (e) {
            showError(e instanceof Error ? e.message : 'Could not load the memory image.')
          }

          camera.position.set(0, 1.55, 0)
          window.XR8.XrController.updateCameraProjectionMatrix({
            origin: camera.position,
            facing: camera.quaternion,
          })

          setHint('Point at the ground and move slowly to place “' + title + '”', true)
          bindTouchGestures()
        },
        onUpdate: () => {
          if (!memoryAnchor) return

          if (phase === 'PLACED') {
            const t = (Date.now() - placedAtMs) / 1000
            const bob = Math.sin(t * Math.PI * 2 * 0.38) * 0.02
            const sway = Math.sin(t * Math.PI * 2 * 0.24) * 0.008
            memoryAnchor.position.y = baseY + bob
            if (tiltGroup) {
              tiltGroup.rotation.y = drag.yaw
              tiltGroup.rotation.x = drag.pitch
              tiltGroup.rotation.z = sway
            }
            return
          }

          const hit = getHitCenter()
          const lock = updateLocking(hit)
          if (!lock.stable || !lock.avg || !lock.normal) {
            if (!hit) {
              setHint('Scan the floor or a flat surface…', true)
            } else if (hit.normal.y < 0.75) {
              setHint('Aim at a horizontal surface', true)
            } else {
              setHint('Hold steady…', true)
            }
            return
          }

          if (!tiltGroup) return

          const { camera } = window.XR8.Threejs.xrScene()
          memoryAnchor.visible = true
          placeCardInWorld(lock.avg, lock.normal, camera)
        },
      })

      const showTapGate = () => {
        hideSplash()
        tapGate.classList.remove('mem-ar-chrome__hidden')
        const onTap = () => {
          tapGate.classList.add('mem-ar-chrome__hidden')
          void startXr()
        }
        tapGate.addEventListener('click', onTap, { once: true })
        tapGate.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault()
            onTap()
          }
        })
      }

      const startXr = async () => {
        if (xrRunning) return
        if (!imageUrl) return

        const motionOk = await requestMotionIfNeeded()
        if (!motionOk) {
          showError('Motion access is needed for world tracking. Enable it in Settings and reload.')
          return
        }

        try {
          const x = window.XR8
          if (!x?.run) throw new Error('8th Wall engine not ready.')

          if (x.loadChunk) {
            try {
              await x.loadChunk('slam')
            } catch {
              /* ignore */
            }
          }

          if (x.XrController?.configure) {
            try {
              x.XrController.configure({ disableWorldTracking: false, enableVps: false, scale: 1 })
            } catch {
              /* ignore */
            }
          }

          if (x.clearCameraPipelineModules) {
            try {
              x.clearCameraPipelineModules()
            } catch {
              /* ignore */
            }
          }

          x.addCameraPipelineModules([
            x.GlTextureRenderer.pipelineModule(),
            x.Threejs.pipelineModule(),
            x.XrController.pipelineModule(),
            window.XRExtras.FullWindowCanvas.pipelineModule(),
            window.XRExtras.RuntimeError.pipelineModule(),
            memorySceneModule(),
          ])

          x.run({ canvas })
          xrRunning = true
        } catch (e) {
          if (isPermissionError(e)) {
            showTapGate()
            return
          }
          showError(e instanceof Error ? e.message : 'Failed to start AR.')
        }
      }

      const onEngineReady = () => {
        if (!imageUrl) return
        void startXr()
      }

      if (window.XR8) onEngineReady()
      else window.addEventListener('xrloaded', onEngineReady, { once: true })
    </script>
  </body>
</html>
