<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0908" />
    <title>Memoria — AR</title>
    <!-- Match https://github.com/8thwall/threejs-world-effects-example -->
    <script
      src="/external/xr/xr.js"
      async
      crossorigin="anonymous"
      data-preload-chunks="slam"
      data-8thwall="xr"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js"
      crossorigin="anonymous"
    ></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0908;
        font-family: system-ui, -apple-system, sans-serif;
        color: #eae6e1;
      }
      #camerafeed {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        touch-action: none;
      }
      .mem-ar-chrome {
        position: fixed;
        z-index: 20;
        pointer-events: none;
        inset: 0;
      }
      .mem-ar-chrome button {
        pointer-events: auto;
        font: inherit;
        cursor: pointer;
        border-radius: 12px;
        border: 1px solid rgba(232, 197, 71, 0.35);
        background: rgba(10, 9, 8, 0.88);
        color: #eae6e1;
        padding: 10px 14px;
        font-weight: 600;
        font-size: 14px;
      }
      .mem-ar-chrome__top {
        position: absolute;
        top: max(12px, env(safe-area-inset-top));
        left: 12px;
        display: flex;
        gap: 8px;
      }
      .mem-ar-chrome__bottom {
        position: absolute;
        left: 16px;
        right: 16px;
        bottom: max(20px, env(safe-area-inset-bottom));
        max-width: 420px;
        margin: 0 auto;
        pointer-events: auto;
      }
      .mem-ar-chrome__panel {
        background: rgba(8, 7, 6, 0.88);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 14px;
        padding: 14px;
      }
      .mem-ar-chrome__panel p {
        margin: 0 0 12px;
        font-size: 14px;
        line-height: 1.45;
        color: rgba(255, 255, 255, 0.9);
      }
      .mem-ar-chrome__primary {
        width: 100%;
        border: none;
        background: linear-gradient(165deg, #e8c547, #a67c1a);
        color: #1a1510;
        padding: 14px;
        font-weight: 700;
      }
      .mem-ar-chrome__error {
        color: #f0a0a0;
        font-size: 13px;
        margin-top: 10px;
      }
      .mem-ar-chrome__hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <canvas id="camerafeed"></canvas>

    <div class="mem-ar-chrome" aria-live="polite">
      <div class="mem-ar-chrome__top">
        <button type="button" id="back-btn" aria-label="Back to map">← Map</button>
      </div>
      <div class="mem-ar-chrome__bottom" id="start-panel">
        <div class="mem-ar-chrome__panel">
          <p id="start-copy">Loading AR engine…</p>
          <button type="button" class="mem-ar-chrome__primary mem-ar-chrome__hidden" id="start-btn">
            Tap to start AR
          </button>
          <p class="mem-ar-chrome__error mem-ar-chrome__hidden" id="error-line" role="alert"></p>
        </div>
      </div>
    </div>

    <script type="module">
      import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js'

      window.THREE = THREE

      const params = new URLSearchParams(window.location.search)
      const imageUrl = params.get('imageUrl') || ''
      const title = params.get('title') || 'Memory'

      const canvas = document.getElementById('camerafeed')
      const startBtn = document.getElementById('start-btn')
      const startPanel = document.getElementById('start-panel')
      const startCopy = document.getElementById('start-copy')
      const errorLine = document.getElementById('error-line')
      const backBtn = document.getElementById('back-btn')

      document.title = 'Memoria — ' + title

      const showError = (msg) => {
        startCopy.textContent = 'AR could not start'
        errorLine.textContent = msg
        errorLine.classList.remove('mem-ar-chrome__hidden')
        startBtn.classList.remove('mem-ar-chrome__hidden')
        startBtn.disabled = false
        startBtn.textContent = 'Try again'
      }

      if (!imageUrl) {
        startCopy.textContent = 'No memory image. Open this view from a map pin.'
        startBtn.classList.add('mem-ar-chrome__hidden')
      }

      backBtn.addEventListener('click', () => {
        try {
          window.XR8?.stop?.()
        } catch {
          /* ignore */
        }
        if (window.history.length > 1) window.history.back()
        else window.location.href = '/map'
      })

      const requestMotionIfNeeded = async () => {
        const dm = window.DeviceMotionEvent
        const dor = window.DeviceOrientationEvent
        const req = dm?.requestPermission || dor?.requestPermission
        if (!req) return true
        try {
          const res = await req.call(dm?.requestPermission ? dm : dor)
          return res === 'granted'
        } catch {
          return false
        }
      }

      let xrRunning = false
      let memoryAnchor = null
      let memoryMesh = null

      const memorySceneModule = () => ({
        name: 'memoria-memory-plane',
        onStart: () => {
          const xrScene = window.XR8.Threejs.xrScene()
          const { scene, camera, renderer } = xrScene

          renderer.shadowMap.enabled = true
          scene.background = null
          renderer.autoClear = false
          renderer.setClearColor(0x000000, 0)

          const hemi = new THREE.HemisphereLight(0xffffff, 0x202020, 0.55)
          scene.add(hemi)

          const dir = new THREE.DirectionalLight(0xffffff, 0.9)
          dir.position.set(2, 4, 1)
          dir.castShadow = true
          scene.add(dir)

          const groundGeo = new THREE.PlaneGeometry(20, 20)
          groundGeo.rotateX(-Math.PI / 2)
          const ground = new THREE.Mesh(groundGeo, new THREE.ShadowMaterial({ opacity: 0.35 }))
          ground.receiveShadow = true
          scene.add(ground)

          memoryAnchor = new THREE.Group()
          scene.add(memoryAnchor)

          const loader = new THREE.TextureLoader()
          if (!imageUrl.startsWith('blob:') && !imageUrl.startsWith('data:')) {
            loader.setCrossOrigin('anonymous')
          }

          loader.load(
            imageUrl,
            (tex) => {
              tex.colorSpace = THREE.SRGBColorSpace
              const img = tex.image
              const iw = img?.width || 1
              const ih = img?.height || 1
              const aspect = iw / ih
              const edge = 1.25
              let w = edge
              let h = edge / aspect
              if (aspect < 1) {
                h = edge
                w = edge * aspect
              }
              const mat = new THREE.MeshBasicMaterial({
                map: tex,
                side: THREE.DoubleSide,
                transparent: true,
              })
              memoryMesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat)
              memoryMesh.castShadow = true
              memoryAnchor.add(memoryMesh)
            },
            undefined,
            () => {
              showError('Could not load the memory image.')
            }
          )

          camera.position.set(0, 1.6, 0)
          window.XR8.XrController.updateCameraProjectionMatrix({
            origin: camera.position,
            facing: camera.quaternion,
          })

          canvas.addEventListener(
            'touchstart',
            (e) => {
              if (e.touches.length === 1) window.XR8.XrController.recenter()
            },
            true
          )

          canvas.addEventListener(
            'touchmove',
            (e) => {
              e.preventDefault()
            },
            { passive: false }
          )
        },
        onUpdate: () => {
          if (!memoryAnchor || !memoryMesh) return
          const { camera } = window.XR8.Threejs.xrScene()
          const dist = 1.15
          const dir = new THREE.Vector3()
          camera.getWorldDirection(dir)
          const pos = camera.position.clone().addScaledVector(dir, dist)
          memoryAnchor.position.copy(pos)
          const toward = new THREE.Vector3().subVectors(camera.position, memoryAnchor.position)
          if (toward.lengthSq() > 1e-8) {
            toward.normalize()
            memoryAnchor.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), toward)
          }
        },
      })

      const startXr = async () => {
        if (xrRunning) return
        if (!imageUrl) return

        startBtn.disabled = true
        startCopy.textContent = 'Starting AR…'

        const motionOk = await requestMotionIfNeeded()
        if (!motionOk) {
          showError('Motion permission denied. Enable motion access and try again.')
          return
        }

        try {
          const x = window.XR8
          if (!x?.run) throw new Error('8th Wall engine not ready.')

          if (x.loadChunk) {
            try {
              await x.loadChunk('slam')
            } catch {
              /* ignore */
            }
          }

          if (x.clearCameraPipelineModules) {
            try {
              x.clearCameraPipelineModules()
            } catch {
              /* ignore */
            }
          }

          const modules = [
            x.GlTextureRenderer.pipelineModule(),
            x.Threejs.pipelineModule(),
            x.XrController.pipelineModule(),
            window.XRExtras.FullWindowCanvas.pipelineModule(),
            window.XRExtras.Loading.pipelineModule(),
            window.XRExtras.RuntimeError.pipelineModule(),
            memorySceneModule(),
          ]

          x.addCameraPipelineModules(modules)
          x.run({ canvas })
          xrRunning = true
          startPanel.classList.add('mem-ar-chrome__hidden')
        } catch (e) {
          showError(e instanceof Error ? e.message : 'Failed to start AR.')
        }
      }

      const onEngineReady = () => {
        if (!imageUrl) return
        startCopy.textContent =
          'Tap below to view “' + title + '” in your space. Single-finger tap recenters.'
        startBtn.classList.remove('mem-ar-chrome__hidden')
        startBtn.addEventListener('click', () => {
          void startXr()
        })
      }

      if (window.XR8) onEngineReady()
      else window.addEventListener('xrloaded', onEngineReady, { once: true })
    </script>
  </body>
</html>
